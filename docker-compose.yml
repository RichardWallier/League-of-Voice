# API stack for the VPS. Deploy:  docker compose up -d
#
# TLS / reverse proxy is handled by nginx on the host (NOT in this stack).
# nginx should proxy the api domain -> http://127.0.0.1:3000 (with WS upgrade for /ws).
#
# Files that must sit next to this one in ~/lov on the VPS:
#   .env         secrets (chmod 600): POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, LOV_DATABASE_URL
#   schema.sql   copied from the api repo's db/schema.sql (first-boot DB init)
#
# Note: the single Watchtower defined here watches the whole Docker host, so it
# also auto-updates the separately-composed `chat` container (via its label).

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    # Bind to localhost only -> Postgres is NOT reachable from the internet.
    # The host-networked api reaches it at 127.0.0.1:5432.
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # schema.sql runs ONCE, only when the data volume is first created.
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      # Marks the container "healthy" only once Postgres accepts connections,
      # so api can wait for it instead of crash-looping on startup.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No watchtower label -> the database is never auto-updated.

  api:
    image: ghcr.io/richardwallier/league-of-voice:latest
    # Host networking: the Pion SFU binds UDP ports for WebRTC media directly
    # on the host, plus :3000 for HTTP/WS signaling. No port mapping needed.
    network_mode: host
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      LOV_DATABASE_URL: ${LOV_DATABASE_URL}
    labels:
      # Only containers with this label are watched/updated by Watchtower.
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    # Maintained fork of the abandoned containrrr/watchtower; uses a current
    # Docker API client so no DOCKER_API_VERSION workaround is needed.
    image: ghcr.io/nicholas-fedor/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Reuses `docker login ghcr.io` creds on the host so Watchtower can
      # pull from GHCR (required if the packages stay private).
      - ${HOME}/.docker/config.json:/config.json:ro
    command: --interval 60 --cleanup --label-enable

volumes:
  pgdata:
